<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  .wrap{width:1200px;height:630px;background:linear-gradient(150deg,#004A66 0%,#005F80 52%,#007A9E 100%);position:relative;overflow:hidden;padding:74px 80px;display:flex;flex-direction:column;justify-content:center}
  .glow{position:absolute;top:-160px;right:-160px;width:620px;height:620px;background:radial-gradient(circle,rgba(41,171,226,0.22) 0%,transparent 70%)}
  .glow2{position:absolute;bottom:-180px;left:-120px;width:520px;height:520px;background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%)}
  .brand{display:flex;align-items:center;gap:18px;margin-bottom:46px;position:relative}
  .brand span{color:#fff;font-size:30px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
  .badge{display:inline-block;align-self:flex-start;background:rgba(41,171,226,0.2);border:1px solid rgba(41,171,226,0.4);color:#9FE3FA;font-size:18px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;border-radius:100px;margin-bottom:26px;position:relative}
  h1{color:#fff;font-size:62px;line-height:1.08;font-weight:700;letter-spacing:-1.5px;max-width:980px;position:relative}
  h1 b{color:#41ABE2}
  p{color:rgba(255,255,255,0.78);font-size:27px;margin-top:24px;font-weight:300;position:relative}
  .url{position:absolute;bottom:54px;left:80px;color:rgba(255,255,255,0.6);font-size:22px;letter-spacing:1px;font-weight:500}
</style><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&display=swap" rel="stylesheet">
</head><body>
<div class="wrap">
  <div class="glow"></div><div class="glow2"></div>
  <div class="brand">
    <span style="display:inline-flex;align-items:center;justify-content:center;width:66px;height:66px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);border-radius:11px;flex-shrink:0;padding:9px;overflow:hidden"><img src="/coglass-icon.png" alt="Coglass" style="width:100%;height:100%;object-fit:contain;border-radius:5px"></span>
    <span>Coglass</span>
  </div>
  <div class="badge">Built for UK glass &amp; glazing</div>
  <h1>Run your glass business<br>from <b>one app</b>.</h1>
  <p>Quote · survey · spec · cut · fit · get paid — built for glass, not borrowed from another trade.</p>
  <div class="url">coglass.co.uk</div>
</div>
</body></html>
